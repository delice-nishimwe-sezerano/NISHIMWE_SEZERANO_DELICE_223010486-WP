<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="converter-box">
    <h2>Currency Converter APP</h2>

    <label>Enter Amount in FRW</label>
    <input type="number" id="amount" placeholder="Enter amount">

    <label>Select Currency</label>
    <select id="currency">
        <option value="USD">USD</option>
        <option value="EURO">EURO</option>
        <option value="GBP">GBP</option>
        <option value="AUD">AUD</option>
        <option value="JPY">JPY</option>
        <option value="CAD">CAD</option>
    </select>

    <label>Rate</label>
    <input type="number" id="rate" placeholder="Enter currency rate">

    <button onclick="convertCurrency()">CONVERT</button>

    <label>Result</label>
    <input type="text" id="result" readonly placeholder="Result Here...">
</div>

<script src="script.js"></script>
</body>
</html>

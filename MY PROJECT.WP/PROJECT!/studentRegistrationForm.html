        <input type="text" id="lastName" name="lastName"><br><br>
        <label for="dateOfBirth">DATE OF BIRTH</label>

            <option value="day">Day:</option>
            <option value="01">01</option>
            <option value="02">02</option>
            <option value="03">03</option>

            <option value="01">January</option>
            <option value="02">February</option>
            <option value="03">March</option>
            <option value="04">April</option>
            <option value="05">May</option>
            <option value="06">June</option>
            <option value="07">July</option>
            <option value="08">August</option>
            <option value="09">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>
        <select name="yearOfBirth" id="yearOfBirth" required>
            <option value="year">Year:</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2019">2019</option>
            <option value="2018">2018</option>
            <option value="2017">2017</option>
            <option value="2016">2016</option>
            <option value="2015">2015</option>
            <option value="2014">2014</option>
        </select>
        <br>
        <br>
        <label for="emailID">EMAIL ID</label>
        <input type="email" id="emailID" name="emailID" required><br><br>
        <br>
        <br>
        <label for="mobileNumber">MOBILE NUMBER</label>
        <input type="tel" id="mobileNumber" name="mobileNumber"><br><br>
        <label for="gender">GENDER</label>
        <input type="radio" id="gender_male" name="gender" value="male"> <label for="gender_male">Male</label>
        <input type="radio" id="gender_female" name="gender" value="female"> <label for="gender_female">Female</label>
        <br><br>
        <label for="address">ADDRESS</label>
        <textarea name="address" id="address"></textarea><br><br>
        <label for="city">CITY</label>
        <input type="text" id="city" name="city"><br><br>
        <label for="pinCode">PIN CODE</label>
        <input type="text" id="pinCode" name="pinCode"><br><br>
        <label for="state">STATE</label>
        <input type="text" id="state" name="state"><br><br>
        <label for="country">COUNTRY</label>
<select id="country" name="country" required>
    <option value="">Select Country</option>
    <option value="Rwanda">Rwanda</option>
    <option value="Kenya">Kenya</option>
    <option value="Uganda">Uganda</option>
    <option value="Tanzania">Tanzania</option>
    <option value="India">India</option>
    <option value="USA">USA</option>
    <option value="UK">United Kingdom</option>
</select>
<br><br>
        <label for="hobbies">HOBBIES</label>
        <label for="hobby1">Drawing</label>
        <input type="checkbox" id="hobby1" name="hobbies" value="drawing">
        <label for="hobby2">Singing</label>
        <input type="checkbox" id="hobby2" name="hobbies" value="singing">
        <label for="hobby3">Dancing</label>

                <th>SI.No.</th>
                <th>Examination</th>
                <th>Board<br><small>(10 char max)</small></th>
                <th>Percentage<br><small>(upto 2 decimal)</small></th>
                <th>Year of Passing</th>
            </tr>
            <tr>
                <td>1</td>
                <td><strong>Class X</strong></td>
                <td><input type="text" name="board1" required></td>
                <td><input type="text" name="percentage1"></td>
                <td><input type="text" name="yearOfPassing1"></td>
            </tr>
            <tr>
                <td>2</td>
                <td><strong>Class XII</strong></td>
                <td><input type="text" name="board2" required></td>
                <td><input type="text" name="percentage2"></td>
                <td><input type="text" name="yearOfPassing2" required></td>
            </tr>
            <tr>
                <td>3</td>
                <td><strong>Graduation</strong></td>
                <td><input type="text" name="board3" required></td>
                <td><input type="text" name="percentage3"></td>
                <td><input type="text" name="yearOfPassing3"></td>
            </tr>
            <tr>
                <td>4</td>
                <td><strong>Masters</strong></td>
                <td><input type="text" name="board4" required></td>
                <td><input type="text" name="percentage4"></td>
                <td><input type="text" name="yearOfPassing4"></td>
            </tr>
        </table>
        <br><br>
        <label for="coursesAppliedFor">COURSES APPLIED FOR</label>
            <label for="bca">BCA</label>
            <input type="checkbox">
            <label for="b.com">B.Com</label>
            <input type="checkbox">
            <label for="b.sc">B.Sc</label>
            <input type="checkbox">
            <label for="b.a">B.A</label>
            <input type="checkbox">
        </select>

        <br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>

</body>
</html>
